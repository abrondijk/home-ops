---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app invoice-ninja-db
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      invoice-ninja-db:
        containers:
          app:
            image:
              repository: mariadb
              tag: 12.0.2
            env:
              TZ: "${TIMEZONE}"
              MARIADB_AUTO_UPGRADE: "TRUE"
              MARIADB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: &secret invoice-ninja-db
                    key: MARIADB_DATABASE
              MARIADB_USER:
                valueFrom:
                  secretKeyRef:
                    name: &secret invoice-ninja-db
                    key: MARIADB_USER
              MARIADB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: &secret invoice-ninja-db
                    key: mariadb-password
              MARIADB_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: &secret invoice-ninja-db
                    key: MARIADB_ROOT_PASSWORD
            envFrom:
              - secretRef:
                  name: invoice-ninja-db
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 50m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      main:
        type: ClusterIP
        controller: *app
        ports:
          http:
            port: 3306
    persistence:
      config:
        existingClaim: invoice-ninja-db
        globalMounts:
          - path: /var/lib/mysql
