---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      vaultwarden:
        containers:
          app:
            image:
              repository: vaultwarden/server
              tag: 1.35.8
            env:
              DATA_FOLDER: config
              TZ: "${TIMEZONE}"
              SIGNUPS_ALLOWED: "false"
              WEBSOCKET_ENABLED: "true"
              DOMAIN: "https://pass.${SECONDARY_SECRET_DOMAIN}"
              ROCKET_PORT: &port 80
            envFrom:
              - secretRef:
                  name: vaultwarden
            resources:
              requests:
                memory: 512Mi
                cpu: 10m
              limits:
                memory: 1024Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /alive
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            name: Vaultwarden
            group: external
        hostnames:
          - "pass.${PRIMARY_SECRET_DOMAIN}"
          - "pass.${SECONDARY_SECRET_DOMAIN}"
        parentRefs:
          - name: external-gateway
            namespace: network
            sectionName: https
          - name: internal-gateway
            namespace: network
            sectionName: https
        rules:
          # Do not publicly expose /admin endpoint.
          - matches:
              - path:
                  value: /admin
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: gateway.envoyproxy.io
                  kind: HTTPRouteFilter
                  name: not-found
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        existingClaim: vaultwarden
