---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-qbittorrent
  namespace: &namespace vpn-routed
spec:
  dependsOn:
    - name: cluster-apps-longhorn
      namespace: storage-system
    - name: apps-vpn-gateway
      namespace: vpn-gateway
  path: ./kubernetes/apps/vpn-routed/qbittorrent/app
  targetNamespace: *namespace
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
