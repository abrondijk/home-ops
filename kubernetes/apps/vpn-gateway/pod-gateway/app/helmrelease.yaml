apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pod-gateway
spec:
  interval: 5m
  chart:
    spec:
      chart: pod-gateway
      version: 6.6.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: angelnu
        namespace: flux-system
  postRenderers:
    # temp solution for https://github.com/angelnu/gateway-admision-controller/issues/299
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: pod-gateway-webhook
            patch: |
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: "kubernetes.io/arch"
                              operator: In
                              values: ["amd64"]
  #See https://github.com/angelnu/helm-charts/blob/main/charts/apps/pod-gatewa/values.yaml
  values:
    image:
      repository: ghcr.io/angelnu/pod-gateway
      tag: v1.13.0@sha256:a5b032e15f7570493977b330a5a86dcffebb807d35685ad803e47afb62d105f2
    webhook:
      image:
        repository: ghcr.io/angelnu/gateway-admision-controller
        pullPolicy: Always
        tag: v3.12.0@sha256:6f6ab596afd5fef0ca4648eadfb21cd37ba86fa5afa8b85edcc072976a61fbed
    addons:
      vpn:
        enabled: true
        type: gluetun
        gluetun:
          image:
            repository: docker.io/qmcgaw/gluetun
            tag: v3.41.1
        envFrom: &secret
          - secretRef:
              name: vpn-authentication
        env:
          DOT: "off"
          FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16,10.20.20.0/24"
          HTTPPROXY: "on"
          IPV6_DISABLED: "true"
          PORT_FORWARD_ONLY: "on"
          VPN_TYPE: wireguard
          LOG_LEVEL: "info"
          VPN_INTERFACE: &interface wg0
        livenessProbe:
          exec:
            command:
              - sh
              - -c
              - "wget -nv -t1 -O - 'http://127.0.0.1:9999' || exit 1"
          initialDelaySeconds: 30
          timeoutSeconds: 2
          failureThreshold: 3
        networkPolicy:
          enabled: true
          egress:
            # Allow only VPN traffic to Internet
            - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
              ports:
                # VPN traffic (default OpenVPN)
                - port: &vpn_port 51820
                  protocol: UDP
            # Allow any traffic within k8s
            - to:
                - ipBlock:
                    # Cluster IPs (default k3s)
                    cidr: 10.0.0.0/8
    routed_namespaces:
      - vpn-routed
    settings:
      VPN_INTERFACE: *interface
      VPN_BLOCK_OTHER_TRAFFIC: true
      VPN_TRAFFIC_PORT: 51820
      DNS_LOCAL_CIDRS: "cluster.local local ${PRIMARY_SECRET_DOMAIN} ${SECONDARY_SECRET_DOMAIN} ${TERTIARY_SECRET_DOMAIN}"
      NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16 172.16.0.0/12"
      VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16 10.20.20.0/24 10.20.50.0/24 172.16.0.0/12"
