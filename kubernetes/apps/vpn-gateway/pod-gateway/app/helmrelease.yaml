apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pod-gateway
spec:
  interval: 5m
  chart:
    spec:
      chart: pod-gateway
      version: 7.1.1
      interval: 15m
      sourceRef:
        kind: HelmRepository
        name: angelnu
        namespace: flux-system
  #See https://github.com/angelnu/helm-charts/blob/main/charts/apps/pod-gatewa/values.yaml
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/angelnu/pod-gateway
              tag: v1.13.0@sha256:a5b032e15f7570493977b330a5a86dcffebb807d35685ad803e47afb62d105f2
          gluetun:
            enabled: true
            dependsOn: main
            image:
              repository: qmcgaw/gluetun
              tag: v3.41.1
            probes:
              startup:
                enabled: false
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - "wget -nv -t1 -O - 'http://127.0.0.1:9999' || exit 1"
                  initialDelaySeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 256Mi
            envFrom: &secret
              - secretRef:
                  name: vpn-authentication
            env:
              DOT: "off"
              FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16,10.20.20.0/24"
              HTTPPROXY: "on"
              IPV6_DISABLED: "true"
              PORT_FORWARD_ONLY: "on"
              VPN_TYPE: wireguard
              LOG_LEVEL: "info"
              VPN_INTERFACE: &interface wg0
          port-forward:
            enabled: true
            dependsOn: gluetun
            image:
              repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
              tag: "1.3"
            resources:
              requests:
                memory: 1Gi
              limits:
                memory: 6Gi
            env:
              PORT_FORWARDED: "/tmp/gluetun/forwarded_port"
              HTTP_S: "http"
            envFrom: *secret
      webhook:
        containers:
          main:
            image:
              repository: ghcr.io/angelnu/gateway-admision-controller
              tag: dev@sha256:e9797e7d9fa2be9e246c6d2f0fbef688ea1c14e29e2e84b2c66c6806cf51d1aa
        pod:
          annotations:
            configmap.reloader.stakater.com/reload: vpn-gateway-pod-gateway
            secret.reloader.stakater.com/reload: vpn-gateway-pod-gateway
    persistence:
      gluetun-data:
        type: emptyDir
        advancedMounts:
          main:
            gluetun:
              - path: /tmp/gluetun
            port-forward:
              - path: /tmp/gluetun
                readOnly: true
    webhook:
      gatewayDefault: true
      gatewayLabel: setGateway
      gatewayAnnotation: setGateway
      namespaceSelector:
        label: "vpn-routed-gateway"
    routed_namespaces:
      - vpn-routed
    networkpolicies:
      main:
        enabled: false
    settings:
      VPN_INTERFACE: *interface
      VPN_BLOCK_OTHER_TRAFFIC: true
      VPN_TRAFFIC_PORT: 51820
      DNS_LOCAL_CIDRS: "local ${PRIMARY_SECRET_DOMAIN} ${SECONDARY_SECRET_DOMAIN} ${TERTIARY_SECRET_DOMAIN}"
      NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16 172.16.0.0/12"
      VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16 10.20.20.0/24 10.20.50.0/24 172.16.0.0/12"
