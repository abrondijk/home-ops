---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: test
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      protonvpn:
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
#          hostNetwork: true
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          gluetun:
            image:
              repository: qmcgaw/gluetun
              tag: v3.41.1
            probes:
              startup:
                enabled: false
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - "wget -nv -t1 -O - 'http://127.0.0.1:9999' || exit 1"
                  initialDelaySeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 256Mi
            envFrom:
              - secretRef:
                  name: vpn-authentication
            env:
              DOT: "off"
              FIREWALL_INPUT_PORTS: "8080,8388,8888,9999"
              FIREWALL_OUTBOUND_SUBNETS: "10.42.5.0/24,10.43.0.0/16,10.20.20.0/24"
              HTTPPROXY: "on"
              IPV6_DISABLED: "true"
              PORT_FORWARD_ONLY: "on"
              SERVER_COUNTRIES: "Germany"
              SHADOWSOCKS: "on"
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: protonvpn
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              LOG_LEVEL: "debug"
              VPN_INTERFACE: wg0
#              HEALTH_TARGET_ADDRESS: "1.1.1.1:80"
          port-forward:
            dependsOn: gluetun
            image:
              repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
              tag: "1.3"
            resources:
              requests:
                memory: 1Gi
              limits:
                memory: 6Gi
            env:
              QBITTORRENT_SERVER: localhost
              QBITTORRENT_PORT: "8080"
              PORT_FORWARDED: "/tmp/gluetun/forwarded_port"
              HTTP_S: "http"
          # qBittorrent application container
    persistence:
      gluetun-data:
        type: emptyDir
        advancedMounts:
          protonvpn:
            gluetun:
              - path: /tmp/gluetun
            port-forward:
              - path: /tmp/gluetun
                readOnly: true
