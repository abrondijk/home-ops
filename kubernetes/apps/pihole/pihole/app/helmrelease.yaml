---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pihole
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      pihole:
        containers:
          app:
            image:
              repository: pihole/pihole
              tag: 2026.02.0
            envFrom:
              - secretRef:
                  name: pihole
            env:
              TZ: "${TIMEZONE}"
              FTLCONF_dns_listeningMode: ALL
              PIHOLE_GID: '1000'
              PIHOLE_UID: '1000'
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 100m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
#              readOnlyRootFilesystem: true
#              capabilities: { drop: ["ALL"] }
#    defaultPodOptions:
#      securityContext:
#        runAsNonRoot: true
#        runAsUser: 1000
#        runAsGroup: 1000
#        fsGroup: 1000
#        fsGroupChangePolicy: OnRootMismatch
#        seccompProfile: { type: RuntimeDefault }
    service:
      main:
        primary: true
        type: LoadBalancer
        loadBalancerIP: "${CLUSTER_PIOLE_IP}"
        externalTrafficPolicy: Local
        ports:
          http:
            port: 80
          dns-udp:
            port: 53
            protocol: UDP
          dns-tcp:
            port: 53
            protocol: TCP
      # Separate ClusterIP service for Gateway API routing
      gateway:
        type: ClusterIP
        ports:
          http:
            port: 80
    persistence:
      config:
        existingClaim: pihole
        advancedMounts:
          pihole:
            app:
              - path: /etc/pihole
                subPath: config
              - path: /etc/dnsmasq.d
                subPath: dnsmasq
    route:
      app:
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https
        hostnames:
          - &host "pihole.${SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: gateway
                port: 80
