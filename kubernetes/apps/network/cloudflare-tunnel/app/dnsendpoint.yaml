---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: cloudflare-tunnel
spec:
  endpoints:
    - dnsName: "external.${PRIMARY_SECRET_DOMAIN}"
      recordType: CNAME
      targets: ["a5465a2f-c140-4f7b-935f-386ef5a989a4.cfargotunnel.com"]
    - dnsName: "external.${SECONDARY_SECRET_DOMAIN}"
      recordType: CNAME
      targets: ["a5465a2f-c140-4f7b-935f-386ef5a989a4.cfargotunnel.com"]
    - dnsName: "external.${TERTIARY_SECRET_DOMAIN}"
      recordType: CNAME
      targets: ["a5465a2f-c140-4f7b-935f-386ef5a989a4.cfargotunnel.com"]
