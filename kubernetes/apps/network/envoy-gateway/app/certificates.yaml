  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
  secretName: "${TERTIARY_SECRET_DOMAIN/./-}-production-tls"
  usages:
    - digital signature
