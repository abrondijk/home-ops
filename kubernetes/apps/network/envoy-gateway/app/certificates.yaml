    - "${SECONDARY_SECRET_DOMAIN}"
    - "*.${SECONDARY_SECRET_DOMAIN}"
  duration: 160h
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
  secretName: "${SECONDARY_SECRET_DOMAIN/./-}-production-tls"
  usages:
    - digital signature
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "${TERTIARY_SECRET_DOMAIN/./-}-production"
spec:
  dnsNames:
    - "${TERTIARY_SECRET_DOMAIN}"
