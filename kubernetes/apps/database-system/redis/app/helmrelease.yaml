---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: redis
      version: 27.0.8
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  maxHistory: 2
  uninstall:
    keepHistory: false
  values:
    auth:
      enabled: false
      sentinel: false
    master:
      resourcesPreset: "small"
      persistence:
        enabled: false
    replica:
      resourcesPreset: "small"
      persistence:
        enabled: false
    architecture: replication
    sentinel:
      enabled: true
      image:
        repository: bitnami/redis-sentinel
        tag: "latest@sha256:0800bd0891c7aa8869a73173809903fdf1a37f9c28d5facd5321ee3be8d6e72a"
        pullPolicy: IfNotPresent
      resourcesPreset: "small"
      masterSet: redis-master
#      getMasterTimeout: 90
#      startupProbe:
#        failureThreshold: 2
      persistence:
        enabled: false
    networkPolicy:
      enabled: false
    image:
      repository: bitnami/redis
      tag: "latest@sha256:4f041bfd31d9be9711b3dc1300b4c1f90dca58c13216c84aa47fa4898945e491"
      pullPolicy: IfNotPresent
    metrics:
      enabled: true
      image:
        repository: bitnami/redis-exporter
        tag: "latest@sha256:6bf8d588852baa292c83e1f5f28106408fdf15ccc1def389206581c67e92aaa3"
        pullPolicy: IfNotPresent
      resourcesPreset: "small"
      serviceMonitor:
        enabled: true
