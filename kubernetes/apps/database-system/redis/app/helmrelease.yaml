---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: redis
      version: 25.3.11
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  maxHistory: 2
  uninstall:
    keepHistory: false
  values:
    auth:
      enabled: false
      sentinel: false
    master:
      resourcesPreset: "small"
      persistence:
        enabled: false
    replica:
      resourcesPreset: "small"
      persistence:
        enabled: false
    architecture: replication
    sentinel:
      enabled: true
      image:
        repository: bitnami/redis-sentinel
        tag: "latest@sha256:bbfa30811b4df9050d08a1ba4daaa329e1b562213f655ab2d040396275bc7cf9"
        pullPolicy: IfNotPresent
      resourcesPreset: "small"
      masterSet: redis-master
#      getMasterTimeout: 90
#      startupProbe:
#        failureThreshold: 2
      persistence:
        enabled: false
    networkPolicy:
      enabled: false
    image:
      repository: bitnami/redis
      tag: "latest@sha256:f3d94ad232c4ace445696beef70e8ebd798fbe1a338b56698db3185fbd68c573"
      pullPolicy: IfNotPresent
    metrics:
      enabled: true
      image:
        repository: bitnami/redis-exporter
        tag: "latest@sha256:03eeabfe10f0b79a84455a9c4c5e8e56a3b1c38995a310984ecadacfc099a3f6"
      pullPolicy: IfNotPresent
      resourcesPreset: "small"
      serviceMonitor:
        enabled: true
