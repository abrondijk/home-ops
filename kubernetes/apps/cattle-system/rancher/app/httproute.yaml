---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rancher
  annotations:
    gatus.home-operations.com/name: "Rancher"
    gatus.home-operations.com/guarded: true
    gatus.home-operations.com/group: internal
spec:
  hostnames:
    - "rancher.${PRIMARY_SECRET_DOMAIN}"
  parentRefs:
    - name: internal-gateway
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: rancher
          port: 80
