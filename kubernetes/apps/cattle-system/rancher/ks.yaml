---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-rancher
  namespace: &namespace cattle-system
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  path: ./kubernetes/apps/cattle-system/rancher/app
  targetNamespace: *namespace
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
