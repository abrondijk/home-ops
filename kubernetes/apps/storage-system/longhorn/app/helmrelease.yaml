---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
  values:
    persistence:
      defaultDataLocality: best-effort
      reclaimPolicy: Retain
    defaultSettings:
      dataEngine: v2
      v1DataEngine: false
      v2DataEngine: true
      allowRecurringJobWhileVolumeDetached: true
      orphanResourceAutoDeletion: "replica-data;instance"
      backupTarget: &s3Target "s3://longhorn.bronlab.backup@eu-central-1/"
      rebuildConcurrentSyncLimit: 2
      defaultDataLocality: best-effort
    metrics:
      serviceMonitor:
        enabled: true
    httproute:
      enabled: true
      parentRefs:
        - name: internal-gateway
          namespace: network
          sectionName: https
      hostnames:
        - "longhorn.${PRIMARY_SECRET_DOMAIN}"
      annotations:
        gatus.home-operations.com/endpoint: |-
          name: Longhorn Dashboard
          group: Internal
          guarded: true

    defaultBackupStore:
      backupTarget: *s3Target
      backupTargetCredentialSecret: longhorn-wasabi-access
      pollInterval: 300
