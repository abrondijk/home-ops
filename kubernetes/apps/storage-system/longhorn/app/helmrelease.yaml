---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
  values:
    persistence:
      defaultDataLocality: best-effort
      reclaimPolicy: Retain
    defaultSettings:
      dataEngine: v2
      v1DataEngine: false
      v2DataEngine: true
      allowRecurringJobWhileVolumeDetached: true
      orphanResourceAutoDeletion: "replicaData;replicaInstance;engineInstance"
      backupTarget: &s3Target "s3://longhorn.bronlab.backup@eu-central-1/"
    metrics:
      serviceMonitor:
        enabled: true
    httproute:
      enabled: true
      parentRefs:
        - name: internal
          namespace: network
          sectionName: https
      hostnames:
        - "longhorn.${SECRET_DOMAIN}"
      annotations:
        gatus.home-operations.com/endpoint: |-
          name: Longhorn Dashboard
          group: Internal
          guarded: true

    defaultBackupStore:
      backupTarget: *s3Target
      backupTargetCredentialSecret: longhorn-wasabi-access
      pollInterval: 300
    # https://github.com/longhorn/longhorn/issues/12599
    image:
      longhorn:
        instanceManager:
          tag: v1.11.0-hotfix-2
        manager:
          tag: v1.11.0-hotfix-1
