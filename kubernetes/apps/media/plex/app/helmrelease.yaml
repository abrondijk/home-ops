---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.1.10576@sha256:f2e33a01419c0b11f1e9d09674418151f7f6dec45a8d61a74b999abfad2115b6
            env:
              TZ: "${TIMEZONE}"
              PUID: "1000"
              PGID: "1000"
              ADVERTISE_IP: "${CLUSTER_PLEX_IP},https://plex.${PRIMARY_SECRET_DOMAIN}:443/"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: &port 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 2000Mi
                gpu.intel.com/i915: 1
              limits:
                memory: 8000Mi
                gpu.intel.com/i915: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: [ "ALL" ] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "${CLUSTER_PLEX_IP}"
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: plex
      medialibrary:
        type: nfs
        server: "${LAN_TRUENAS_IP}"
        path: "${TRUENAS_MEBIALIBRARY_PATH}"
        globalMounts:
          - readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          plex:
            app:
              - path: /config/Library/Application Support/Plex Media Server/Logs
                subPath: logs
              - path: /transcode
                subPath: transcode
              - path: /tmp
                subPath: tmp
    route:
      app:
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https
        hostnames:
          - "plex.${PRIMARY_SECRET_DOMAIN}"
        rules:
          - # Ref: https://forums.plex.tv/t/external-srt-subtitles-are-not-working-w-reverse-proxy/886540
            backendRefs:
              - identifier: app
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Range
            matches:
              - path:
                  type: PathPrefix
                  value: /library/streams
          - backendRefs:
              - identifier: app
                port: *port
