---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      radarr:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: 6.2.0.10390@sha256:be596a2f896fdf15077af027f44500f73e1f6fb7b450a6494b37dd25b7cc5927
              pullPolicy: IfNotPresent
            env:
              RADARR__SERVER__PORT: &port 80
              RADARR__POSTGRES__HOST: "${POSTGRES_HOST}"
              RADARR__POSTGRES__PORT: "${POSTGRES_PORT}"
              TZ: "${TIMEZONE}"
            envFrom:
              - secretRef:
                  name: radarr-cnpg-credentials
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: radarr
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${PRIMARY_SECRET_DOMAIN}"
          - "{{ .Release.Name }}.${SECONDARY_SECRET_DOMAIN}"
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: radarr
      medialibrary:
        enabled: true
        type: nfs
        server: "${LAN_TRUENAS_IP}"
        path: "${TRUENAS_MEBIALIBRARY_PATH}"
