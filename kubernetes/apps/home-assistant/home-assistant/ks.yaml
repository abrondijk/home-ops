---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-home-assistant
  namespace: &namespace home-assistant
spec:
  path: ./kubernetes/apps/home-assistant/home-assistant/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
  interval: 15m
  retryInterval: 1m
  timeout: 5m
