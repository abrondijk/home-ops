---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      home-assistant:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.5@sha256:982a89a77cbed2effc00765e7902a95e09c71ff4c8b2e2de36edaeaabc993f12
            env:
              TZ: "${TIMEZONE}"
              HASS_HTTP_TRUSTED_PROXY_1: 10.42.0.0/16
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              limits:
                memory: 2Gi
              requests:
                cpu: 200m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.123.0@sha256:6d46b83ea0687ab1826ec029b6d0e6342bbd55cc5c29b98258463e7faee16d1e
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "12321"
              - /config
            env:
              HASS_SERVER: http://localhost:8123
              TZ: "${TIMEZONE}"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      main:
        primary: true
        forceRename: *app
        type: LoadBalancer
        controller: *app
        loadBalancerIP: "${CLUSTER_HOME_ASSISTANT_IP}"
        externalTrafficPolicy: Local
        ports:
          http:
            port: 8123
      # Separate ClusterIP service for Gateway API routing
      gateway:
        controller: *app
        type: ClusterIP
        ports:
          http:
            port: 8123
      code:
        type: ClusterIP
        controller: *app
        ports:
          http:
            port: 12321
    persistence:
      config:
        existingClaim: home-assistant
        advancedMounts:
          home-assistant:
            app:
              - path: /config
            code-server:
              - path: /config
      hass-cache:
        existingClaim: home-assistant-cache
        advancedMounts:
          home-assistant:
            app:
              - path: /config/.venv
                subPath: hass-venv
      tmpfs:
        type: emptyDir
        advancedMounts:
          home-assistant:
            app:
              - path: /tmp
                subPath: hass-tmp
            code-server:
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            name: "Home Assistant"
            group: External
        parentRefs:
          - name: external-gateway
            namespace: network
            sectionName: https
        hostnames:
          - &host "home.${PRIMARY_SECRET_DOMAIN}"
        rules:
          - backendRefs:
              - identifier: gateway
                port: 8123
      internal:
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https
        hostnames:
          - *host
        rules:
          - backendRefs:
              - identifier: gateway
                port: 8123
      code:
        annotations:
          gatus.home-operations.com/endpoint: |-
            name: "Home Configurator"
            group: Internal
            ui:
              hide-url: true
              hide-hostname: true
        enabled: true
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https
        hostnames:
          - "home-code.${PRIMARY_SECRET_DOMAIN}"
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: home-assistant-code
                port: 12321
