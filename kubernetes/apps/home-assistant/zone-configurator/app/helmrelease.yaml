---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zone-configurator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      zone-configurator:
        pod:
          annotations:
            reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: everythingsmarthome/everything-presence-mmwave-configurator
              tag: 2.0.12

            envFrom:
              - secretRef:
                  name: zone-configurator

            env:
              HA_BASE_URL: "http://home-assistant:8123"
              APP_PORT: &port 42069

            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - "ALL"
            resources:
              requests:
                memory: 128M
                cpu: 20m
              limits:
                memory: 256M
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["zone-configurator.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal-gateway
            namespace: network
            sectionName: https

    persistence:
      data:
        existingClaim: zone-configurator
        globalMounts:
          - path: /config
